apiVersion: v1
kind: Service
metadata:
  name: message-service
spec:
  selector:
    app: message-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-service
  template:
    metadata:
      labels:
        app: message-service
    spec:
      containers:
        - name: message-service
          image: mablinov2704/message-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: DB_DSN
              value: postgres://messenger:messenger123@postgres:5432/messenger?sslmode=disable
            - name: UPLOADS_DIR
              value: /uploads
          volumeMounts:
            - name: uploads
              mountPath: /uploads
      volumes:
        - name: uploads
          emptyDir: {}