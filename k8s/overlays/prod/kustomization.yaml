apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: messenger-prod

resources:
  - ../../base

labels:
  - pairs:
      environment: production
      managed-by: argocd

patches:
  - target:
      kind: StatefulSet
      name: postgres
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: workload
                      operator: In
                      values:
                        - system

  - target:
      kind: Deployment
      name: message-service
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: workload
                      operator: In
                      values:
                        - app
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: disk
                      operator: In
                      values:
                        - fast

  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3