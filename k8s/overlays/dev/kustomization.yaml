apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: messenger-dev

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "64Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "128Mi"

commonLabels:
  environment: dev
  managed-by: kustomize