apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: messenger
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ZhenyaHeisenberg/lab-k8s-messager
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: messenger
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true